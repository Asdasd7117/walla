workflows:
  android-apk:
    name: Android APK (Clean Build)
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.yemen.services"
    
    triggering:
      events: [push]
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    
    # ❌ عطل الكاش تماماً
    cache:
      cache_paths: []
    
    scripts:
      - name: تنظيف شامل
        script: |
          echo "🧹 Deep clean..."
          flutter clean
          rm -rf .dart_tool build/ android/.gradle pubspec.lock
          flutter pub get
          
          echo "✅ Checking project name..."
          if grep -q "^name: yemen_services" pubspec.yaml; then
            echo "✅ Project name correct"
          else
            echo "❌ Project name WRONG - must be 'yemen_services'"
            exit 1
          fi

      - name: بناء APK
        script: |
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
