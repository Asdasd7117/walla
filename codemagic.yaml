workflows:
  simple-apk:
    name: Simple APK Build
    environment:
      flutter: stable
      android_signing: []  # ✅ لا توقيع مؤقتاً لتسريع البناء
      vars:
        # اسم الحزمة - يمكن تعديله لاحقاً
        PACKAGE_NAME: "com.yemen.services"
    
    triggering:
      events: [push]
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    
    # ❌ عطل الكاش نهائياً لتجنب مشاكل my_app
    cache:
      cache_paths: []
    
    scripts:
      - name: Clean & Setup
        script: |
          echo "🔥 Starting clean build..."
          
          # تنظيف شامل
          flutter clean
          rm -rf .dart_tool build/ pubspec.lock android/.gradle
          
          # إعادة تثبيت الحزم
          echo "📦 Getting dependencies..."
          flutter pub get
          
          # عرض اسم المشروع للتأكد
          echo "📋 Project name:"
          head -1 pubspec.yaml
          
          echo "✅ Setup complete"

      - name: Build APK
        script: |
          echo "🔨 Building APK..."
          
          flutter build apk --release \
            --no-tree-shake-icons \
            --no-obfuscate \
            --dart-define=flutter.inspector.structuredErrors=false
          
          echo "✅ Build complete"
          
          # عرض حجم الملف
          ls -lh build/app/outputs/flutter-apk/*.apk

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
      # ✅ يمكن إضافة Slack/Google Play لاحقاً
