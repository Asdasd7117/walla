workflows:
  android-apk-only:
    name: APK Only (Fastest)
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.yourservices.yemen"
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    
    cache:
      cache_paths: []
    
    scripts:
      - name: تنظيف
        script: |
          flutter clean
          rm -rf .dart_tool build/
          flutter pub get

      - name: بناء APK فقط
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
